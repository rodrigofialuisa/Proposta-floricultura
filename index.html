<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Uma proposta para a Flor &amp; Sentido</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sage: #7A9E7E;
  --sage-light: #A8C5AC;
  --sage-dark: #4E7153;
  --cream: #FAF7F2;
  --warm-white: #FDFCFA;
  --blush: #E8C5B0;
  --blush-deep: #D4956A;
  --forest: #2D4A30;
  --charcoal: #2A2A2A;
  --mid: #5A5A5A;
  --soft: #9A9A9A;
  --border: rgba(122,158,126,0.2);
  --shadow-soft: 0 4px 30px rgba(45,74,48,0.08);
  --shadow-card: 0 8px 40px rgba(45,74,48,0.12);
  --radius: 20px;
  --radius-sm: 12px;
}

html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; background: var(--warm-white); color: var(--charcoal); overflow-x: hidden; line-height: 1.7; }

h1, h2, h3 { font-family: 'Cormorant Garamond', serif; font-weight: 500; line-height: 1.15; }
h1 { font-size: clamp(3rem, 6.5vw, 6rem); }
h2 { font-size: clamp(2rem, 4vw, 3.5rem); }
h3 { font-size: clamp(1.2rem, 2vw, 1.7rem); }
p  { font-size: clamp(0.95rem, 1.5vw, 1.05rem); color: var(--mid); }

.container { max-width: 1160px; margin: 0 auto; padding: 0 clamp(1.2rem, 5vw, 3rem); }
.section    { padding: clamp(5rem, 10vw, 9rem) 0; }
.section-alt { background: var(--cream); }

.tag {
  display: inline-block;
  font-size: 0.7rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--sage-dark); background: rgba(122,158,126,0.12);
  padding: 6px 16px; border-radius: 100px; margin-bottom: 1.2rem;
}

.btn {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 1rem;
  padding: 16px 36px; border-radius: 100px;
  cursor: pointer; transition: all 0.3s ease; text-decoration: none; border: none;
}
.btn-primary { background: var(--forest); color: white; box-shadow: 0 8px 30px rgba(45,74,48,0.3); }
.btn-primary:hover { background: var(--sage-dark); transform: translateY(-2px); }
.btn-whatsapp { background: #25D366; color: white; box-shadow: 0 8px 30px rgba(37,211,102,0.3); }
.btn-whatsapp:hover { background: #1ebe5d; transform: translateY(-2px); }

/* NAV */
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1.4rem 0; transition: all 0.4s ease; }
nav.scrolled { background: rgba(253,252,250,0.94); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0.9rem 0; }
.nav-inner { display: flex; align-items: center; justify-content: space-between; }
.nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 500; color: white; text-decoration: none; transition: color 0.3s; display: flex; flex-direction: column; line-height: 1.15; }
.nav-logo small { font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.45); font-family: 'DM Sans', sans-serif; font-weight: 400; }
nav.scrolled .nav-logo { color: var(--forest); }
nav.scrolled .nav-logo small { color: var(--soft); }
.nav-cta { display: none; align-items: center; gap: 8px; font-size: 0.88rem; padding: 10px 22px; background: var(--forest); color: white; border-radius: 100px; text-decoration: none; font-weight: 500; transition: all 0.3s; }
nav.scrolled .nav-cta { display: flex; }
.nav-cta:hover { background: var(--sage-dark); }

/* HERO */
.hero { position: relative; min-height: 100svh; display: flex; align-items: center; overflow: hidden; }
.hero-bg { position: absolute; inset: 0; background: linear-gradient(140deg, #111e12 0%, #2D4A30 50%, #3a6040 100%); }
.hero-bg::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 65% 65% at 75% 35%, rgba(168,197,172,0.15) 0%, transparent 65%), radial-gradient(ellipse 40% 40% at 15% 85%, rgba(232,197,176,0.1) 0%, transparent 55%); }
.hero-bg-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.35; }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(to right, rgba(17,30,18,0.9) 45%, rgba(17,30,18,0.2) 100%); z-index: 1; }

.proposal-ribbon { position: absolute; top: 2rem; right: 0; background: var(--blush-deep); color: white; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; padding: 8px 28px 8px 20px; border-radius: 4px 0 0 4px; z-index: 3; display: flex; align-items: center; gap: 8px; box-shadow: -4px 4px 20px rgba(0,0,0,0.25); }
.proposal-ribbon::before { content: '✦'; font-size: 0.6rem; }

.hero-content { position: relative; z-index: 2; padding: 9rem 0 6rem; max-width: 700px; }

.hero-greeting { display: flex; align-items: center; gap: 12px; margin-bottom: 2.5rem; }
.greeting-line { height: 1px; width: 36px; background: rgba(255,255,255,0.3); }
.greeting-text { font-size: 0.78rem; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.5); font-weight: 500; }

.hero h1 { color: white; margin-bottom: 1.6rem; font-weight: 400; }
.hero h1 em { font-style: italic; color: var(--blush); display: block; }
.hero-sub { font-size: clamp(1rem, 1.7vw, 1.15rem); color: rgba(255,255,255,0.65); margin-bottom: 2.8rem; max-width: 540px; line-height: 1.85; }

.hero-author { display: flex; align-items: center; gap: 14px; margin-top: 3.5rem; padding-top: 2.5rem; border-top: 1px solid rgba(255,255,255,0.1); }
.author-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--sage), var(--blush-deep)); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: white; flex-shrink: 0; }
.author-name { font-size: 0.95rem; color: white; font-weight: 500; }
.author-role { font-size: 0.77rem; color: rgba(255,255,255,0.4); letter-spacing: 0.04em; }

.scroll-indicator { position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%); z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 8px; color: rgba(255,255,255,0.35); font-size: 0.67rem; letter-spacing: 0.15em; text-transform: uppercase; }
.scroll-line { width: 1px; height: 45px; background: linear-gradient(to bottom, rgba(255,255,255,0.35), transparent); animation: scrollPulse 2s ease-in-out infinite; }
@keyframes scrollPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

/* INTRO PESSOAL */
.intro-personal { background: var(--forest); padding: clamp(4rem, 8vw, 6rem) 0; }
.intro-personal .container { display: grid; grid-template-columns: 1fr 2fr; gap: 4rem; align-items: center; }
@media (max-width: 680px) { .intro-personal .container { grid-template-columns: 1fr; gap: 2rem; } }
.intro-label { font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 0.7rem; }
.intro-name { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 300; color: white; line-height: 1; margin-bottom: 0.4rem; }
.intro-title { font-size: 0.84rem; color: var(--sage-light); letter-spacing: 0.04em; }
.intro-right blockquote { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.3rem, 2.2vw, 1.9rem); font-weight: 300; font-style: italic; color: rgba(255,255,255,0.85); line-height: 1.65; border-left: 2px solid var(--sage); padding-left: 2rem; }
.intro-right p { color: rgba(255,255,255,0.48); font-size: 0.9rem; margin-top: 1.5rem; padding-left: 2rem; line-height: 1.85; }

/* TWO-COL */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(3rem, 6vw, 7rem); align-items: center; }
@media (max-width: 768px) { .two-col { grid-template-columns: 1fr; gap: 2.5rem; } .two-col.reverse .col-img { order: -1; } }
.col-text h2 { margin-bottom: 1.2rem; color: var(--forest); }
.col-text p  { margin-bottom: 1.4rem; }
.col-img { position: relative; }
.col-img::before { content: ''; position: absolute; width: 75%; height: 75%; border-radius: 50%; background: linear-gradient(135deg, rgba(168,197,172,0.18), rgba(232,197,176,0.12)); top: 12%; left: -8%; z-index: 0; filter: blur(40px); }
.img-wrap { border-radius: var(--radius); overflow: hidden; position: relative; z-index: 1; box-shadow: var(--shadow-card); }
.img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.col-img .img-wrap { aspect-ratio: 4/5; }
.img-placeholder { width: 100%; min-height: 400px; display: flex; align-items: center; justify-content: center; font-size: 5rem; background: linear-gradient(135deg, rgba(168,197,172,0.2), rgba(232,197,176,0.15)); }

/* SECTION HEADER */
.section-header { max-width: 620px; margin-bottom: 3.5rem; }
.section-header.center { margin: 0 auto 3.5rem; text-align: center; }
.section-header h2 { color: var(--forest); margin-bottom: 1rem; }

/* CARDS */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.4rem; margin-top: 3.5rem; }
.card { background: white; border-radius: var(--radius); padding: 1.8rem 1.8rem 2rem; border: 1px solid var(--border); box-shadow: var(--shadow-soft); transition: all 0.3s ease; position: relative; overflow: hidden; }
.card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--sage), var(--blush)); opacity: 0; transition: opacity 0.3s; }
.card:hover { transform: translateY(-5px); box-shadow: var(--shadow-card); }
.card:hover::before { opacity: 1; }
.card-icon { width: 48px; height: 48px; border-radius: 12px; background: linear-gradient(135deg, rgba(122,158,126,0.13), rgba(168,197,172,0.13)); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; margin-bottom: 1.1rem; }
.card h3 { font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--forest); }
.card p  { font-size: 0.9rem; line-height: 1.7; }

.feature-list { list-style: none; display: flex; flex-direction: column; gap: 0.85rem; margin: 1.4rem 0; }
.feature-list li { display: flex; align-items: flex-start; gap: 12px; font-size: 0.95rem; color: var(--mid); }
.feature-list li::before { content: '✦'; color: var(--sage); font-size: 0.55rem; margin-top: 6px; flex-shrink: 0; }

.highlight-box { background: linear-gradient(135deg, rgba(122,158,126,0.07), rgba(232,197,176,0.07)); border: 1px solid rgba(122,158,126,0.2); border-radius: var(--radius-sm); padding: 1.5rem 1.8rem; margin-top: 1.8rem; }
.highlight-box p { font-size: 0.92rem; color: var(--charcoal); line-height: 1.75; }

/* STEPS */
.steps { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0; margin-top: 3.5rem; position: relative; }
.steps::before { content: ''; position: absolute; top: 35px; left: 10%; right: 10%; height: 1px; background: linear-gradient(90deg, transparent, var(--sage-light), transparent); }
@media (max-width: 600px) { .steps::before { display: none; } .steps { gap: 2rem; } }
.step { text-align: center; padding: 0 1.2rem; }
.step-num { width: 70px; height: 70px; border-radius: 50%; background: white; border: 1.5px solid var(--sage-light); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.4rem; font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; color: var(--sage-dark); position: relative; z-index: 1; box-shadow: 0 4px 20px rgba(122,158,126,0.12); }
.step h3 { font-size: 1rem; margin-bottom: 0.4rem; color: var(--forest); }
.step p  { font-size: 0.86rem; }

/* QUOTE */
.quote-section { background: var(--forest); padding: clamp(4rem, 8vw, 7rem) 0; text-align: center; }
.quote-section blockquote { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.6rem, 3vw, 2.6rem); font-style: italic; color: white; max-width: 720px; margin: 0 auto; line-height: 1.55; font-weight: 300; }

/* DASHBOARD */
.dashboard-mockup { background: white; border-radius: var(--radius); box-shadow: 0 20px 80px rgba(45,74,48,0.18); overflow: hidden; border: 1px solid var(--border); }
.mockup-bar { background: var(--forest); padding: 12px 20px; display: flex; align-items: center; gap: 8px; }
.mockup-dot { width: 12px; height: 12px; border-radius: 50%; }
.mockup-layout { display: grid; grid-template-columns: 190px 1fr; min-height: 360px; }
@media (max-width: 600px) { .mockup-layout { grid-template-columns: 1fr; } }
.mockup-sidebar { background: #f7faf7; border-right: 1px solid var(--border); padding: 1.4rem 1rem; display: flex; flex-direction: column; gap: 3px; }
.mockup-nav-item { padding: 9px 14px; border-radius: 10px; font-size: 0.82rem; color: var(--mid); display: flex; align-items: center; gap: 10px; transition: all 0.2s; }
.mockup-nav-item.active { background: var(--forest); color: white; }
.mockup-main { padding: 1.4rem; display: flex; flex-direction: column; gap: 1rem; }
.mockup-kpis { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.75rem; }
.kpi { background: var(--cream); border-radius: 12px; padding: 1rem; }
.kpi-val { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; color: var(--forest); line-height: 1; }
.kpi-lbl { font-size: 0.7rem; color: var(--soft); margin-top: 4px; }
.mockup-chart-area { background: var(--cream); border-radius: 12px; padding: 1rem; flex: 1; }

/* BUSINESS FLOW */
.business-flow { display: flex; align-items: flex-start; flex-wrap: wrap; justify-content: center; gap: 0; margin-top: 3rem; background: var(--cream); border-radius: var(--radius); padding: 2rem 1.5rem; border: 1px solid var(--border); }
.bflow-step { display: flex; flex-direction: column; align-items: center; text-align: center; flex: 1; min-width: 150px; max-width: 210px; gap: 0.75rem; padding: 0.5rem; }
.bflow-icon { width: 54px; height: 54px; border-radius: 16px; background: white; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; box-shadow: var(--shadow-soft); }
.bflow-text { display: flex; flex-direction: column; gap: 4px; }
.bflow-text strong { font-size: 0.85rem; font-weight: 600; color: var(--forest); }
.bflow-text span   { font-size: 0.78rem; color: var(--soft); line-height: 1.5; }
.bflow-arrow { font-size: 1.3rem; color: var(--sage-light); padding: 0 0.2rem; margin-top: 1.1rem; flex-shrink: 0; }
@media (max-width: 640px) { .bflow-arrow { display: none; } .bflow-step { max-width: 100%; flex-direction: row; text-align: left; } .business-flow { gap: 1rem; } }

/* PRICING */
.pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 3.5rem; align-items: start; }
.plan { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 2.4rem 2rem; position: relative; box-shadow: var(--shadow-soft); transition: all 0.3s; }
.plan:hover { transform: translateY(-6px); box-shadow: var(--shadow-card); }
.plan.featured { background: var(--forest); border-color: var(--forest); transform: scale(1.04); }
.plan.featured:hover { transform: scale(1.04) translateY(-6px); }
.plan-badge { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); background: var(--blush-deep); color: white; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 18px; border-radius: 100px; white-space: nowrap; }
.plan-name { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 500; color: var(--forest); margin-bottom: 0.4rem; }
.plan.featured .plan-name { color: rgba(255,255,255,0.65); }
.plan-price { font-family: 'Cormorant Garamond', serif; font-size: 3.4rem; font-weight: 300; color: var(--forest); line-height: 1; margin: 0.9rem 0; }
.plan.featured .plan-price { color: white; }
.plan-price span { font-size: 1.1rem; vertical-align: top; margin-top: 0.7rem; display: inline-block; }
.plan-period { font-size: 0.82rem; color: var(--soft); }
.plan.featured .plan-period { color: rgba(255,255,255,0.45); }
.plan-desc { font-size: 0.82rem; font-style: italic; color: var(--soft); margin: 0.8rem 0 1.2rem; line-height: 1.6; }
.plan.featured .plan-desc { color: rgba(255,255,255,0.4); }
.plan-divider { border: none; border-top: 1px solid var(--border); margin: 1.4rem 0; }
.plan.featured .plan-divider { border-color: rgba(255,255,255,0.15); }
.plan-features { list-style: none; display: flex; flex-direction: column; gap: 0.8rem; }
.plan-features li { display: flex; align-items: flex-start; gap: 10px; font-size: 0.9rem; color: var(--mid); }
.plan.featured .plan-features li { color: rgba(255,255,255,0.8); }
.plan-features li::before { content: '✦'; color: var(--sage); font-size: 0.55rem; margin-top: 5px; flex-shrink: 0; }
.plan.featured .plan-features li::before { color: var(--blush); }

.plan-info-note { display: flex; gap: 1.2rem; align-items: flex-start; background: linear-gradient(135deg, rgba(45,74,48,0.05), rgba(122,158,126,0.06)); border: 1px solid rgba(122,158,126,0.22); border-left: 4px solid var(--sage); border-radius: var(--radius-sm); padding: 1.8rem 2rem; margin-top: 2.5rem; }
.pin-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 2px; }
.plan-info-note strong { display: block; font-size: 1rem; color: var(--forest); margin-bottom: 0.5rem; }
.plan-info-note p { font-size: 0.9rem; line-height: 1.8; color: var(--mid); }

/* RESULTS */
.results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.4rem; margin-top: 3.5rem; }
.result-card { text-align: center; padding: 2.5rem 1.5rem; background: white; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-soft); }
.result-num { font-family: 'Cormorant Garamond', serif; font-size: 3.8rem; font-weight: 300; color: var(--forest); line-height: 1; display: block; margin-bottom: 0.4rem; }
.result-card p { font-size: 0.88rem; }

.chart-wrap { background: white; border-radius: var(--radius); padding: 2.5rem; box-shadow: var(--shadow-card); border: 1px solid var(--border); }

/* MINI IMG GRID */
.mini-img-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 12px; height: 460px; }
.mini-img-grid .img-wrap:first-child { grid-row: 1 / 3; }

/* CTA FINAL */
.cta-final { background: linear-gradient(135deg, var(--forest) 0%, #111e12 100%); position: relative; overflow: hidden; padding: clamp(5rem, 10vw, 9rem) 0; }
.cta-final::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 50% 80% at 80% 20%, rgba(168,197,172,0.1) 0%, transparent 55%), radial-gradient(ellipse 40% 60% at 10% 90%, rgba(232,197,176,0.07) 0%, transparent 50%); }
.cta-final .container { position: relative; z-index: 1; text-align: center; }
.cta-final h2 { color: white; margin-bottom: 1rem; }
.cta-final .sub { color: rgba(255,255,255,0.6); max-width: 520px; margin: 0 auto 0.8rem; font-size: 1rem; }
.cta-final .assinatura { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-style: italic; color: rgba(255,255,255,0.35); margin-bottom: 2.8rem; }

/* FLOAT WA */
.float-wa { position: fixed; bottom: 2rem; right: 2rem; z-index: 200; width: 60px; height: 60px; border-radius: 50%; background: #25D366; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 30px rgba(37,211,102,0.4); text-decoration: none; animation: floatPulse 3s ease-in-out infinite; transition: transform 0.3s; }
.float-wa:hover { transform: scale(1.1); }
.float-wa svg { width: 28px; height: 28px; fill: white; }
@keyframes floatPulse { 0%,100% { box-shadow: 0 8px 30px rgba(37,211,102,0.4); } 50% { box-shadow: 0 8px 50px rgba(37,211,102,0.6); } }

footer { background: #0f1a10; color: rgba(255,255,255,0.3); text-align: center; padding: 2.5rem; font-size: 0.82rem; line-height: 2; }
footer span { color: rgba(255,255,255,0.6); }
footer a
